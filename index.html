<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boomtown Scheduler — Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ease-out: cubic-bezier(0.23, 1, 0.32, 1); --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);
    --gold:#F5C400; --red:#ef4444; --green:#22c55e;
    --bg:#000; --card:#111; --cell:#0a0a0a; --border:#2a2a2a;
    --t1:#fff; --t2:#ccc; --t3:#aaa; --rail:#0d0d0d;
    --display:'Oswald', 'Arial Narrow', sans-serif;
    --body:'Archivo', system-ui, sans-serif;
    font-size:16.5px;
  }
  html.light{
    --bg:#fafafa; --card:#fff; --cell:#fff; --border:#e6e6e6;
    --t1:#111; --t2:#444; --t3:#888; --rail:#f3f3f3;
  }
  html.ts2{font-size:18px} html.ts3{font-size:20px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--t1);font-family:var(--body);line-height:1.45;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;color:inherit}
  .wrap{max-width:1180px;margin:0 auto;padding:0 16px}
  body.public .wrap{max-width:980px}

  /* ---------- header ---------- */
  header{position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:1px solid var(--border)}
  .topbar{display:flex;align-items:center;gap:14px;padding:12px 0;flex-wrap:wrap}
  .brand{font-family:var(--display);font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:1.45rem;color:var(--gold);line-height:1;white-space:nowrap}
  .brand small{display:block;font-size:.5rem;letter-spacing:.34em;color:var(--t3);font-weight:500}
  .spacer{flex:1}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--card)}
  .seg button{padding:7px 13px;background:transparent;border:none;font-size:.8rem;font-weight:600;color:var(--t3);transition:color .15s var(--ease-out),background .15s var(--ease-out)}
  .seg button.on{background:var(--gold);color:#000}
  .iconbtn{border:1px solid var(--border);background:var(--card);border-radius:8px;padding:7px 11px;font-size:.8rem;font-weight:600;color:var(--t2);transition:border-color .15s var(--ease-out),color .15s var(--ease-out)}
  @media (hover:hover) and (pointer:fine){ .iconbtn:hover{border-color:var(--gold);color:var(--t1)} .seg button:not(.on):hover{color:var(--t1)} }
  .iconbtn:active{transform:scale(.97)}
  .viewtag{font-family:var(--display);text-transform:uppercase;letter-spacing:.12em;font-size:.62rem;font-weight:600;padding:4px 9px;border-radius:99px}
  .viewtag.int{background:rgba(245,196,0,.14);color:var(--gold);border:1px solid rgba(245,196,0,.35)}
  .viewtag.pub{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.35)}

  .monthnav{display:flex;align-items:center;gap:10px}
  .monthnav h2{font-family:var(--display);font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:1.1rem;min-width:168px;text-align:center}
  .nav-arrow{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:1rem;display:grid;place-items:center}

  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 0 14px}
  select.filt{background:var(--card);color:var(--t1);border:1px solid var(--border);border-radius:8px;padding:6px 9px;font-size:.78rem;font-family:inherit}
  .filt-label{font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);font-weight:600}

  /* ---------- layout ---------- */
  .stage{display:flex;gap:16px;align-items:flex-start;padding-bottom:20px}
  .calwrap{flex:1;min-width:0}

  /* ---------- month grid ---------- */
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
  .dow span{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);font-weight:600;text-align:center;padding:4px 0}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:128px;gap:6px}
  .cell{background:var(--cell);border:1px solid var(--border);border-radius:10px;padding:6px;display:flex;flex-direction:column;gap:3px;height:128px;overflow:hidden;transition:border-color .15s var(--ease-out)}
  .cell.out{opacity:.4}
  .cell.today{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold)}
  .cell.sel{outline:2px solid var(--gold);outline-offset:1px}
  @media (hover:hover) and (pointer:fine){ .cell:hover{border-color:#3d3d3d;cursor:pointer} }
  .daynum{font-size:.72rem;font-weight:700;color:var(--t2);display:flex;justify-content:space-between;align-items:center}
  .today .daynum .tag{background:var(--gold);color:#000;font-size:.5rem;font-weight:700;padding:1px 5px;border-radius:99px;letter-spacing:.08em}
  .ev{font-size:.66rem;font-weight:600;padding:3px 6px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;line-height:1.25;transition:transform .12s var(--ease-out)}
  @media (hover:hover) and (pointer:fine){ .ev:hover{transform:translateX(1px)} }
  .ev .ico{font-size:.7rem}
  .ev.cancelled{background:transparent!important;border:1px dashed var(--red);color:var(--red)!important;text-decoration:line-through}
  .ev.tentative{opacity:.62}
  .ev.conflict{background:var(--red)!important;color:#fff!important;box-shadow:0 0 0 1px #7f1d1d}
  .ev.share{box-shadow:0 0 0 1.5px var(--gold)}
  .closed-banner{background:var(--red);color:#fff;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;text-align:center;padding:3px;border-radius:4px}
  .more{font-size:.6rem;color:var(--t3);font-weight:600;padding:1px 5px}
  @media (hover:hover) and (pointer:fine){ .more:hover{color:var(--gold)} }

  /* ---------- floor map ---------- */
  .panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:16px}
  .panel h3{font-family:var(--display);text-transform:uppercase;letter-spacing:.08em;font-size:.85rem;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:8px}
  .panel .sub{font-size:.7rem;color:var(--t3);margin-bottom:12px}
  .floor{display:flex;gap:14px;align-items:stretch;flex-wrap:wrap}
  .hw,.sc{display:flex;gap:6px}
  .floor-label{font-size:.55rem;text-transform:uppercase;letter-spacing:.14em;color:var(--t3);font-weight:600;margin-bottom:5px;text-align:center}
  .col{display:flex;flex-direction:column;gap:6px}
  .court{width:54px;height:40px;border-radius:6px;background:#1c1c1c;border:1px solid var(--border);display:grid;place-items:center;font-size:.66rem;font-weight:700;color:var(--t3);position:relative;transition:background .2s var(--ease-out)}
  html.light .court{background:#ededed}
  .court.booked{color:#000}
  .court.conflict{outline:2px solid var(--red);outline-offset:-2px}
  .divider{width:1px;background:var(--border);align-self:stretch;margin:18px 4px 0}
  .rooms{display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start}
  .room{min-width:78px;height:40px;border-radius:6px;background:#1c1c1c;border:1px solid var(--border);display:grid;place-items:center;font-size:.58rem;font-weight:600;color:var(--t3);padding:0 6px;text-align:center;transition:background .2s var(--ease-out)}
  html.light .room{background:#ededed}
  .bracket{font-size:.52rem;color:var(--t3);text-align:center;letter-spacing:.1em;text-transform:uppercase;margin-top:3px}

  /* ---------- side panel ---------- */
  .side{width:354px;flex:0 0 354px;background:var(--rail);border:1px solid var(--border);border-radius:12px;align-self:stretch;position:sticky;top:78px;max-height:calc(100vh - 96px);overflow-y:auto;animation:slidein .22s var(--ease-out)}
  @keyframes slidein{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
  .side .bar{height:6px;border-radius:12px 12px 0 0}
  .side .pad{padding:14px 16px}
  .side .closex{position:absolute;top:10px;right:12px;width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--card);font-size:.9rem;display:grid;place-items:center;z-index:2}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 8px}
  .badge{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:99px}
  .b-conf{background:rgba(34,197,94,.15);color:var(--green)} .b-tent{background:rgba(245,196,0,.15);color:var(--gold)} .b-canc{background:rgba(239,68,68,.15);color:var(--red)}
  .b-share{background:rgba(245,196,0,.12);color:var(--gold);border:1px solid rgba(245,196,0,.4)}
  .b-conflict{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.5)}
  .side h4{font-family:var(--display);text-transform:uppercase;letter-spacing:.03em;font-size:1.15rem;font-weight:600;line-height:1.1}
  .side .op{font-size:.78rem;color:var(--t2);margin-bottom:12px}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;margin-bottom:12px}
  .kv .k{font-size:.56rem;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);font-weight:600}
  .kv .v{font-size:.82rem;color:var(--t1);font-weight:500}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
  .chip{font-size:.62rem;font-weight:600;padding:3px 8px;border-radius:5px;background:#000;border:1px solid var(--border);color:var(--t2)}
  html.light .chip{background:#f0f0f0}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0;text-align:center}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 4px}
  .stat .n{font-family:var(--display);font-size:1.4rem;font-weight:700;line-height:1}
  .stat .l{font-size:.52rem;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-top:3px}
  .sec{border-top:1px solid var(--border);padding-top:11px;margin-top:11px}
  .sec .h{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);font-weight:700;margin-bottom:6px}
  .rolerow{font-size:.74rem;color:var(--t2);margin-bottom:2px}
  .catering{border:1px solid var(--gold);border-radius:8px;padding:9px;background:rgba(245,196,0,.06)}
  .notes{border-left:3px solid var(--red);padding:4px 0 4px 10px;font-size:.76rem;color:var(--t2)}
  .lnk{color:var(--gold);font-size:.76rem;text-decoration:none;word-break:break-all}
  .lnk:hover{text-decoration:underline}
  .foot{font-size:.6rem;color:var(--t3);margin-top:12px;border-top:1px solid var(--border);padding-top:8px}
  .daylist .dl-ev{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:.76rem;font-weight:500}
  .daylist .swatch{width:4px;height:24px;border-radius:2px;flex:0 0 4px}

  /* ---------- legend ---------- */
  .legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:14px;padding:12px 0;border-top:1px solid var(--border)}
  .leg{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--t2)}
  .leg .sw{width:13px;height:13px;border-radius:3px}

  /* ---------- modal (public) ---------- */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(2px);z-index:50;display:grid;place-items:center;padding:20px;animation:fade .18s var(--ease-out)}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:14px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto;animation:pop .2s var(--ease-out)}
  @keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
  .modal .bar{height:7px;border-radius:14px 14px 0 0}
  .modal .pad{padding:18px 20px}
  .pill{display:inline-block;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;background:var(--cell);border:1px solid var(--border);padding:3px 9px;border-radius:99px;color:var(--t2);margin-bottom:8px}
  .btn-primary{display:block;width:100%;text-align:center;background:var(--gold);color:#000;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:.8rem;padding:12px;border-radius:9px;border:none;margin-top:6px;text-decoration:none}
  .btn-row{display:flex;gap:8px;margin-top:8px}
  .btn-ghost{flex:1;text-align:center;border:1px solid var(--border);background:var(--cell);border-radius:9px;padding:9px;font-size:.72rem;font-weight:600;color:var(--t2);text-decoration:none}
  .share{display:flex;gap:8px;margin-top:10px}
  .share button{flex:1;border:1px solid var(--border);background:var(--cell);border-radius:8px;padding:8px;font-size:.66rem;font-weight:600;color:var(--t2)}

  /* ---------- tooltip ---------- */
  #tip{position:fixed;z-index:60;pointer-events:none;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 11px;width:210px;font-size:.7rem;opacity:0;transition:opacity .12s var(--ease-out);box-shadow:0 8px 30px rgba(0,0,0,.5)}
  #tip .tt-bar{height:4px;border-radius:3px;margin-bottom:7px}
  #tip .tt-t{font-weight:700;font-size:.78rem;margin-bottom:3px}
  #tip .tt-r{color:var(--t3);display:flex;justify-content:space-between;gap:8px}
  #tip .tt-r b{color:var(--t2);font-weight:600}

  .list-table{width:100%;border-collapse:collapse;font-size:.78rem}
  .list-table th{text-align:left;font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);padding:8px;border-bottom:1px solid var(--border)}
  .list-table td{padding:8px;border-bottom:1px solid var(--border);color:var(--t2)}
  .list-table tr:nth-child(even) td{background:var(--cell)}
  @media (hover:hover) and (pointer:fine){ .list-table tbody tr:hover td{background:var(--rail);cursor:pointer} }

  @media (max-width:860px){
    .side{position:fixed;inset:auto 0 0 0;width:100%;flex:none;max-height:74vh;border-radius:16px 16px 0 0;z-index:40;box-shadow:0 -8px 40px rgba(0,0,0,.6);animation:slideup .26s var(--ease-drawer)}
    @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
    .grid{grid-auto-rows:96px}
    .cell{height:96px}
    .topbar{gap:8px}
  }
  @media (max-width:600px){
    :root{font-size:15.5px}
    .wrap{padding:0 10px}
    .topbar{gap:7px;padding:9px 0}
    .brand-logo{padding:4px 8px 3px} .brand-logo img{height:22px} .brand-logo small{font-size:.4rem;letter-spacing:.22em}
    #viewtag{display:none}
    .toolbar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:8px;padding:8px 0 12px;scrollbar-width:none}
    .toolbar::-webkit-scrollbar{display:none}
    .toolbar .spacer{display:none}
    .monthnav h2{min-width:116px;font-size:.95rem}
    .nav-arrow{width:32px;height:32px}
    .filt-label{display:none}
    select.filt{flex:0 0 auto}
    .grid{grid-auto-rows:88px;gap:4px}
    .cell{height:88px;padding:5px;gap:3px;border-radius:8px}
    .dow{gap:4px} .dow span{font-size:.54rem;padding:2px 0}
    .daynum{font-size:.66rem}
    .today .daynum .tag{font-size:.42rem;padding:1px 4px}
    .ev{font-size:.62rem;padding:2px 5px;min-height:17px;line-height:1.25;border-radius:5px}
    .ev .ico{font-size:.55rem}
    .closed-banner{font-size:.5rem;padding:2px;line-height:1.1}
    .more{font-size:.54rem;padding:0 2px}
    .floor{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px;scrollbar-width:none}
    .floor::-webkit-scrollbar{display:none}
    .floor > div,.rooms{flex:0 0 auto}
    .court{width:46px;height:36px} .room{min-width:72px;height:36px}
    .legend{gap:8px 12px;font-size:.68rem}
    .list-table{font-size:.72rem} .list-table th,.list-table td{padding:6px 5px}
    .backdrop{padding:0;align-items:end} .modal{max-width:100%;border-radius:16px 16px 0 0;max-height:90vh}
  }
  @media (prefers-reduced-motion:reduce){ *{animation-duration:.01ms!important;transition-duration:.01ms!important} }
  .brand-logo{display:inline-flex;flex-direction:column;align-items:flex-start;gap:1px;background:#000;border:1px solid #1c1c1c;border-radius:9px;padding:6px 11px 5px;line-height:1}
  .brand-logo img{height:30px;width:auto;display:block}
  .brand-logo small{font-size:.45rem;letter-spacing:.3em;color:var(--t3);font-weight:600;text-transform:uppercase;align-self:center;margin-top:2px}
  .cell{position:relative}
  .qa-add{position:absolute;top:5px;right:5px;width:18px;height:18px;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--t2);font-size:.85rem;line-height:1;display:grid;place-items:center;opacity:0;transition:opacity .12s var(--ease-out);z-index:3}
  @media (hover:hover){.cell:hover .qa-add{opacity:1}}
  @media (hover:none){.qa-add{opacity:1}}
  .qa label{display:block;font-size:.56rem;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-weight:700;margin:9px 0 3px}
  .qa input,.qa select{width:100%;background:var(--cell);border:1px solid var(--border);border-radius:7px;padding:8px;color:var(--t1);font-family:inherit;font-size:.82rem}
  .qa .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  :focus{outline:none}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}
  .cell:focus-visible{outline:2px solid var(--gold);outline-offset:-2px}
  .ev:focus-visible,.more:focus-visible,.qa-add:focus-visible{outline:2px solid var(--gold);outline-offset:1px}
  button,.ev,.cell,.more{touch-action:manipulation}
  .kbhelp{flex-basis:100%;font-size:.62rem;color:var(--t3);padding-top:8px}
  @media (max-width:600px){ .iconbtn,.nav-arrow,.seg button{min-height:40px} }
  .btn-del{display:block;width:100%;margin-top:10px;padding:9px;border-radius:8px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:.74rem;font-weight:700;letter-spacing:.03em}
  @media (hover:hover){.btn-del:hover{background:rgba(239,68,68,.12)}}
  .ev[draggable="true"]{cursor:grab}
  .ev[draggable="true"]:active{cursor:grabbing}
  .cell.dragover{border-color:var(--gold);box-shadow:inset 0 0 0 2px var(--gold)}
  #livestatus{position:fixed;left:12px;bottom:12px;z-index:70;font-size:.66rem;font-weight:600;padding:6px 11px;border-radius:99px;border:1px solid var(--border);background:var(--card);color:var(--t3);max-width:280px;box-shadow:0 4px 16px rgba(0,0,0,.4)}
  #livestatus.ok{border-color:var(--green);color:var(--green)}
  #livestatus.warn{border-color:var(--gold);color:var(--gold)}
</style>
</head>
<body class="internal">
<header>

/* ============================ STATE ============================ */
function _today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
let state = { view:'internal', mode:'month', month:new Date().getMonth(), year:new Date().getFullYear(), selDate:_today(), selEvent:null, focusDate:_today(), kbNav:false,
  colorBy:'operator', ts:1, theme:'dark', op:'all', sport:'all', type:'all' };
let draggedId=null;

/* ============================ CONFLICT ENGINE ============================ */
function timeOverlap(a,b){ return a.st < b.et && b.st < a.et; }
function dateRange(e){ const out=[]; let d=new Date(e.start+'T00:00'); const end=new Date(e.end+'T00:00');
  while(d<=end){ out.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1);} return out; }
function sharesDate(a,b){ return dateRange(a).some(d=>dateRange(b).includes(d)); }
function atomOverlap(a,b){ const s=new Set(b.atoms.map(String)); return a.atoms.some(x=>s.has(String(x))); }

// returns map id -> 'hard' | 'share' | null
function computeConflicts(events){
  const res={};
  for(let i=0;i<events.length;i++){
    for(let j=i+1;j<events.length;j++){
      const a=events[i],b=events[j];
      if(a.status==='Cancelled'||b.status==='Cancelled') continue;
      if(sharesDate(a,b) && timeOverlap(a,b) && atomOverlap(a,b)){
        const lvl = (a.courtShare||b.courtShare) ? 'share' : 'hard';
        if(lvl==='hard' || !res[a.id]) res[a.id]=lvl;
        if(lvl==='hard' || !res[b.id]) res[b.id]=lvl;
      }
    }
  }
  return res;
}
let CONFLICTS = computeConflicts(EVENTS);

/* ============================ HELPERS ============================ */
function colorOf(e){ return state.colorBy==='operator' ? (OPERATORS[e.operator]||{}).c : (SPORT_COLOR[e.sport]||'#888'); }
function textOf(e){ if(state.colorBy==='operator') return (OPERATORS[e.operator]||{}).t||'#000';
  const c=SPORT_COLOR[e.sport]||'#888'; return c==='#E05555'||c==='#6B8FD4'||c==='#9b6bd4'?'#fff':'#000'; }
function fmtTime(t){ let [h,m]=t.split(':').map(Number); const ap=h>=12?'PM':'AM'; h=h%12||12; return `${h}:${String(m).padStart(2,'0')} ${ap}`; }
function visibleEvents(){
  return EVENTS.filter(e=>{
    if(state.view==='public' && e.status!=='Confirmed') return false;
    if(state.op!=='all' && e.operator!==state.op) return false;
    if(state.sport!=='all' && e.sport!==state.sport) return false;
    if(state.view==='internal' && state.type!=='all' && e.type!==state.type) return false;
    return true;
  });
}
function eventsOn(dateStr){ return visibleEvents().filter(e=>dateRange(e).includes(dateStr)); }

/* ============================ RENDER: MONTH ============================ */
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const TODAY=_today();

function renderMonth(){
  const cw=document.getElementById('calwrap');
  const first=new Date(state.year,state.month,1);
  const startDow=first.getDay();
  const start=new Date(state.year,state.month,1-startDow);
  let html='<div class="dow">'+DOW.map(d=>`<span>${d}</span>`).join('')+'</div><div class="grid" role="grid" aria-label="Month calendar — use arrow keys to move, Enter to open">';
  for(let i=0;i<42;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const inMonth=d.getMonth()===state.month;
    const evs=eventsOn(ds);
    const closures=evs.filter(e=>e.type==='Facility Closure');
    const normal=evs.filter(e=>e.type!=='Facility Closure');
    let cls='cell'; if(!inMonth)cls+=' out'; if(ds===TODAY)cls+=' today'; if(ds===state.selDate)cls+=' sel';
    const ti = ds===(state.focusDate||state.selDate||TODAY)?0:-1;
    const lbl = `${DOW[d.getDay()]} ${MONTHS[d.getMonth()]} ${d.getDate()}, ${evs.length} event${evs.length!==1?'s':''}`;
    html+=`<div class="${cls}" data-date="${ds}" role="gridcell" tabindex="${ti}" aria-label="${lbl}">`;
    html+=`<div class="daynum"><span>${d.getDate()}</span>${ds===TODAY?'<span class="tag">TODAY</span>':''}</div>`;
    if(state.view==='internal') html+=`<button class="qa-add" data-add="${ds}" title="Quick add (N)">+</button>`;
    closures.forEach(()=>html+=`<div class="closed-banner">Closed</div>`);
    normal.slice(0,2).forEach(e=>{
      const cf=CONFLICTS[e.id];
      const stcls=e.status==='Cancelled'?' cancelled':e.status==='Tentative'?' tentative':'';
      const cfcls=cf==='hard'?' conflict':cf==='share'?' share':'';
      const bg=colorOf(e),tx=textOf(e);
      html+=`<div class="ev${stcls}${cfcls}" data-ev="${e.id}" tabindex="0" role="button" aria-label="${e.title}, ${e.sport}, ${e.status}" style="background:${bg};color:${tx}">`+
            `${e.catering?'<span class="ico">🍽</span>':''}${cf==='hard'?'<span class="ico">⚠</span>':''}${e.title}</div>`;
    });
    if(normal.length>2) html+=`<div class="more" data-more="${ds}" tabindex="0" role="button" aria-label="Show all ${normal.length} events">+${normal.length-2} more</div>`;
    html+='</div>';
  }
  html+='</div>';
  cw.innerHTML=html+floorMapHTML()+legendHTML();
}

/* ============================ RENDER: LIST ============================ */
function renderList(){
  const cw=document.getElementById('calwrap');
  const evs=visibleEvents().filter(e=>dateRange(e).some(d=>d.startsWith(`2026-${String(state.month+1).padStart(2,'0')}`)))
    .sort((a,b)=>(a.start+a.st).localeCompare(b.start+b.st));
  let rows=evs.map(e=>{
    const cf=CONFLICTS[e.id];
    const badge=cf==='hard'?' <span style="color:var(--red)">⚠</span>':cf==='share'?' <span style="color:var(--gold)">⇄</span>':'';
    return `<tr data-ev="${e.id}"><td>${e.start.slice(5)}</td><td style="color:var(--t1);font-weight:600">${e.title}${badge}</td>`+
      `<td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${(OPERATORS[e.operator]||{}).c};margin-right:5px"></span>${e.operator}</td>`+
      `<td>${e.sport}</td>`+(state.view==='internal'?`<td>${e.type}</td>`:'')+`<td>${e.spaceLabel}</td><td>${e.allDay?'All day':fmtTime(e.st)+'–'+fmtTime(e.et)}</td>`+
      (state.view==='internal'?`<td>${e.staffing||'—'}</td>`:'')+`<td>${e.status}</td></tr>`;
  }).join('');
  cw.innerHTML=`<div class="panel"><table class="list-table"><thead><tr><th>Date</th><th>Event</th><th>Operator</th><th>Sport</th>`+
    (state.view==='internal'?'<th>Type</th>':'')+`<th>Spaces</th><th>Time</th>`+(state.view==='internal'?'<th>Staff</th>':'')+
    `<th>Status</th></tr></thead><tbody>${rows||'<tr><td colspan="9" style="text-align:center;color:var(--t3);padding:24px">No events match filters</td></tr>'}</tbody></table>`+
    `<div style="font-size:.7rem;color:var(--t3);margin-top:10px">${evs.length} event${evs.length!==1?'s':''} shown</div></div>`;
}

/* ============================ FLOOR MAP ============================ */
function floorMapHTML(){
  if(state.view!=='internal') return '';
  const evs=eventsOn(state.selDate).filter(e=>e.status!=='Cancelled');
  const occ={}; // atom -> [events]
  evs.forEach(e=>e.atoms.forEach(a=>{ (occ[a]=occ[a]||[]).push(e); }));
  function courtCell(n){
    const list=occ[n]||[]; let style='',cls='court',label=n;
    if(list.length){ const e=list[0]; const hard=list.length>1 && !list.some(x=>x.courtShare);
      style=hard?`background:var(--red);color:#fff;`:`background:${colorOf(e)};`; cls+=' booked'+(hard?' conflict':''); }
    return `<div class="${cls}" style="${style}" data-court="${n}">${label}</div>`;
  }
  function roomCell(r){ const list=occ[r]||[]; let style='',cls='room';
    if(list.length){ style=`background:${colorOf(list[0])};color:#000;`; cls+=' booked'; }
    return `<div class="${cls}" style="${style}">${r}</div>`; }
  const dd=new Date(state.selDate+'T00:00');
  return `<div class="panel"><h3>Facility Floor Map <span style="font-size:.62rem;color:var(--t3);font-weight:400">— ${DOW[dd.getDay()]} ${MONTHS[dd.getMonth()]} ${dd.getDate()}</span></h3>
    <div class="sub">Click a day to update. Courts light up by ${state.colorBy}. Red outline = unresolved conflict.</div>
    <div class="floor">
      <div><div class="floor-label">Hardwood (West)</div><div class="hw">
        <div class="col">${[1,2,3,4].map(courtCell).join('')}<div class="bracket">BB 1 · BB 2</div></div>
        <div class="col">${[5,6,7,8].map(courtCell).join('')}<div class="bracket">BB 3 · BB 4</div></div>
      </div></div>
      <div class="divider"></div>
      <div><div class="floor-label">Sports Court (East)</div><div class="sc">
        <div class="col">${[9,10].map(courtCell).join('')}</div>
        <div class="col">${[11,12,13].map(courtCell).join('')}<div class="bracket">Badminton zone</div></div>
      </div></div>
      <div style="flex:1;min-width:170px"><div class="floor-label">Ancillary Spaces</div>
        <div class="rooms">${ROOMS.map(roomCell).join('')}</div></div>
    </div></div>`;
}

/* ============================ LEGEND ============================ */
function legendHTML(){
  const items = state.colorBy==='operator'
    ? Object.entries(OPERATORS).map(([n,o])=>`<div class="leg"><span class="sw" style="background:${o.c}"></span>${n}</div>`)
    : Object.entries(SPORT_COLOR).map(([n,c])=>`<div class="leg"><span class="sw" style="background:${c}"></span>${n}</div>`);
  return `<div class="legend">${items.join('')}
    <div class="leg"><span class="sw" style="background:var(--red)"></span>Conflict</div>
    <div class="leg"><span class="sw" style="background:transparent;box-shadow:0 0 0 1.5px var(--gold)"></span>Court Share</div>
    <div class="kbhelp">Keyboard: Tab into the grid, then arrow keys move by day, Enter opens, Page&uarr;/Page&darr; change month, N new event, M/L switch views, Esc closes.</div></div>`;
}

      </div>

        ${e.preset?`<div style="font-size:.62rem;color:var(--t3);margin-top:5px">Booked as preset: <b style="color:var(--gold)">${e.preset==='Badminton'?'Badminton (locks 11–13)':e.preset}</b></div>`:''}</div>

function render(){
  document.body.className=state.view; // 'internal' | 'public'
  document.getElementById('monthlabel').textContent=`${MONTHS[state.month]} ${state.year}`;
  document.getElementById('viewtag').className='viewtag '+(state.view==='internal'?'int':'pub');

  document.querySelectorAll('.int-only').forEach(n=>n.style.display=state.view==='internal'?'':'none');

  document.getElementById('colorby').textContent='Color: '+(state.colorBy==='operator'?'Operator':'Sport');
  document.getElementById('quickadd').style.display=state.view==='internal'?'':'none';
  if(state.mode==='month') renderMonth(); else renderList();
  renderSide();
  wireCells();
  if(state.kbNav && state.mode==='month'){ const fc=document.querySelector(`.cell[data-date="${state.focusDate}"]`); if(fc) fc.focus(); state.kbNav=false; }

function wireCells(){
  document.querySelectorAll('.cell').forEach(c=>{
    c.onclick=ev=>{ if(ev.target.closest('[data-ev]')||ev.target.closest('[data-more]'))return;
      state.selDate=c.dataset.date; state.selEvent=null;
      if(state.view==='internal'){ renderMonth(); wireCells(); renderSide(); } };
    if(state.view==='internal'){
      c.ondragover=ev=>{ ev.preventDefault(); ev.dataTransfer.dropEffect='move'; c.classList.add('dragover'); };
      c.ondragleave=()=>c.classList.remove('dragover');
      c.ondrop=ev=>{ ev.preventDefault(); c.classList.remove('dragover'); if(draggedId){ moveEvent(draggedId,c.dataset.date); draggedId=null; } };
    }
  });
  document.querySelectorAll('[data-ev]').forEach(n=>{
    n.onclick=ev=>{ ev.stopPropagation(); const id=n.dataset.ev;
      if(state.view==='public') openModal(id);
      else { state.selEvent=id; const e=EVENTS.find(x=>x.id===id); state.selDate=e.start; hideTip(); renderSide(); } };
    const e=EVENTS.find(x=>x.id===n.dataset.ev);
    if(e){ n.onmousemove=ev=>showTip(e,ev.clientX,ev.clientY); n.onmouseleave=hideTip; }
    if(state.view==='internal'){ n.setAttribute('draggable','true');
      n.ondragstart=ev=>{ draggedId=n.dataset.ev; ev.dataTransfer.effectAllowed='move'; hideTip(); };
      n.ondragend=()=>{ draggedId=null; document.querySelectorAll('.cell.dragover').forEach(c=>c.classList.remove('dragover')); }; }
  });
  document.querySelectorAll('[data-more]').forEach(n=>{
    n.onclick=ev=>{ ev.stopPropagation(); state.selDate=n.dataset.more; state.selEvent=null;
      if(state.view==='internal'){renderMonth();wireCells();renderSide();} }; });
  document.querySelectorAll('[data-add]').forEach(n=>{ n.onclick=ev=>{ ev.stopPropagation(); openQuickAdd(n.dataset.add); }; });
  document.querySelectorAll('[data-ev],[data-more]').forEach(n=>{ n.onkeydown=ev=>{ if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();n.click();} }; });
  document.querySelectorAll('.court[data-court]').forEach(c=>{
    c.onclick=()=>{ const evs=eventsOn(state.selDate).filter(e=>e.atoms.map(String).includes(c.dataset.court));
      if(evs.length){ state.selEvent=evs[0].id; renderSide(); } };
  });
}

function moveEvent(id,newDate){
  const e=EVENTS.find(x=>x.id===id); if(!e||!newDate)return;

  e.start=newDate; const nd=new Date(newDate+'T00:00'); nd.setDate(nd.getDate()+dur);
  e.end=`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}-${String(nd.getDate()).padStart(2,'0')}`;
  CONFLICTS=computeConflicts(EVENTS); state.selDate=newDate; state.selEvent=id; render();
}

function _csv(text){ const rows=[]; let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"')q=true; else if(c===','){row.push(cur);cur='';} else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else if(c!=='\r')cur+=c; } }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); } return rows; }
function _to24(t){ t=(t||'').trim(); if(!t)return '00:00';
  const m=t.match(/(\d{1,2}):(\d{2})(?::\d{2})?\s*([AaPp][Mm])?/); if(!m)return '00:00';
  let h=+m[1]; const ap=(m[3]||'').toUpperCase(); if(ap==='PM'&&h<12)h+=12; if(ap==='AM'&&h===12)h=0;
  return String(h).padStart(2,'0')+':'+m[2]; }
function _date(d){ d=(d||'').trim(); if(!d)return '';
  let m=d.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m)return m[1]+'-'+m[2]+'-'+m[3];
  m=d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m)return m[3]+'-'+String(+m[1]).padStart(2,'0')+'-'+String(+m[2]).padStart(2,'0');
  const x=new Date(d); return isNaN(x)?d:x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'); }
function _atoms(sp){ return (sp||'').split(',').map(s=>s.trim()).filter(Boolean).map(s=>{const m=s.match(/(\d+)/);return m?Number(m[1]):s;}); }
function _yn(v){ return /^(y|true|1)/i.test((v||'').trim()); }
function _num(v){ const x=parseInt((v||'').replace(/[^0-9.]/g,''),10); return isNaN(x)?undefined:x; }
function _splitL(v){ return (v||'').split(',').map(s=>s.trim()).filter(Boolean); }
function setStatus(msg,kind){ const el=document.getElementById('livestatus'); if(!el)return; el.textContent=msg; el.className=kind||''; if(kind==='ok')setTimeout(()=>{el.style.transition='opacity .6s';el.style.opacity='0';},4500); }
async function loadLiveData(){
  if(!CONFIG.csvUrl){ setStatus('Demo data (no sheet configured)','warn'); return; }
  try{
    const res=await fetch(CONFIG.csvUrl,{redirect:'follow'}); if(!res.ok) throw 0;
    const rows=_csv(await res.text()); if(rows.length<2) throw 0;
    const head=rows[0].map(s=>s.trim());
    if(head.indexOf('Event Title')<0){ setStatus('Demo data — published tab is not the Events tab','warn'); return; }
    const gi=nm=>head.indexOf(nm); const g=(r,nm)=>{const i=gi(nm);return i>=0?(r[i]||'').trim():'';};
    const out=[];
    for(let ri=1;ri<rows.length;ri++){ const r=rows[ri]; const title=g(r,'Event Title'); if(!title)continue;
      const start=_date(g(r,'Start Date')); const end=_date(g(r,'End Date'))||start;
      const sp=g(r,'Spaces (atoms)'); const pn=g(r,'POC Name'),pe=g(r,'POC Email'),pp=g(r,'POC Phone');
      out.push({ id:g(r,'Event ID')||('R'+ri), title, sport:g(r,'Sport')||'None', type:g(r,'Event Type')||'Other',
        operator:g(r,'Operator')||'External / Rental', start, end, st:_to24(g(r,'Start Time')), et:_to24(g(r,'End Time')),
        atoms:_atoms(sp), spaceLabel:sp||'—', status:g(r,'Status')||'Confirmed', preset:g(r,'Booked-as Preset'),
        allDay:_yn(g(r,'All Day')), courtShare:_yn(g(r,'Court Share')), repeat:g(r,'Repeat'), seriesId:g(r,'Series ID'),
        desc:g(r,'Description (public)'), regLink:g(r,'Registration Link'), reg:_num(g(r,'Registration Count')),
        doorCharge:_yn(g(r,'Door Charge')), paymentLink:g(r,'Payment Link'), attendees:_num(g(r,'Estimated Attendees')),
        staffing:g(r,'Staffing Level'), facilityRoles:_splitL(g(r,'Facility Staff Roles')), odaRoles:_splitL(g(r,'Oda Up Staff Roles')),
        catering:_yn(g(r,'Catering Required')), cateringNotes:g(r,'Catering Notes'), externalLink:g(r,'External Link'),
        poc:(pn||pe||pp)?{name:pn,email:pe,phone:pp}:null, notes:g(r,'Internal Notes'), createdBy:g(r,'Created By') }); }
    if(!out.length){ setStatus('Demo data — sheet reachable but no events found','warn'); return; }
    EVENTS.length=0; out.forEach(e=>EVENTS.push(e)); CONFLICTS=computeConflicts(EVENTS);
    const ds=out.map(e=>e.start).filter(Boolean).sort(); if(ds.length){ const f=new Date(ds[0]+'T00:00'); state.month=f.getMonth(); state.year=f.getFullYear(); }
    render(); setStatus('Live: '+out.length+' events from your sheet','ok');
  }catch(err){ setStatus('Demo data — could not reach sheet (works once hosted on GitHub)','warn'); }
}
function applyParams(){
  const q=new URLSearchParams(location.search);
  const v=(q.get('view')||'').toLowerCase();
  const op=q.get('operator');
  if(v==='internal'){ state.view='internal'; }
  else if(v==='public'||v==='club'){
    state.view='public';
    document.querySelectorAll('#viewseg button').forEach(b=>b.classList.toggle('on',b.dataset.view==='public'));
  }
  if(op){ state.op=op.trim(); const sel=document.getElementById('opfilt'); if(sel)sel.value=state.op; }
  state.locked=(v==='club');
  if(state.locked){
    const vs=document.getElementById('viewseg'); if(vs)vs.style.display='none';
    const of=document.getElementById('opfilt'); if(of)of.style.display='none';
    const ol=document.getElementById('opfilt-l'); if(ol)ol.style.display='none';
    const small=document.querySelector('.brand-logo small'); if(small&&op)small.textContent=op+' Calendar';
  }
}
fillFilters();
applyParams();
render();
loadLiveData();
</script>
<div id="livestatus">Loading\u2026</div>
</body>
